networks:
  hadoop_hadoop_net:
    external: true
  spark_net:
    driver: bridge

services:

  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    user: root
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/spark/sbin/start-master.sh
        tail -f /opt/spark/logs/*.out
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:7077:7077"
    volumes:
      - ./jobs:/opt/spark-jobs
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - spark_net
      - hadoop_hadoop_net
    restart: unless-stopped

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 10
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077
        tail -f /opt/spark/logs/*.out
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    volumes:
      - ./jobs:/opt/spark-jobs
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - spark_net
      - hadoop_hadoop_net
    depends_on:
      - spark-master
    restart: unless-stopped

  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 10
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077
        tail -f /opt/spark/logs/*.out
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    volumes:
      - ./jobs:/opt/spark-jobs
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - spark_net
      - hadoop_hadoop_net
    depends_on:
      - spark-master
    restart: unless-stopped
